<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI - Zero Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            color: white;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="antialiased overflow-hidden p-2 md:p-4">

    <!-- Simple Login -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] text-center shadow-2xl">
            <h1 class="text-4xl font-black mb-1 tracking-tighter text-blue-500">UNIVERSAL</h1>
            <p class="text-slate-500 mb-8 text-sm uppercase tracking-widest">Powered by GPT-OSS</p>
            <div class="space-y-4">
                <input type="text" id="auth-u" placeholder="Username" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500">
                <input type="password" id="auth-p" placeholder="Password" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500">
                <button onclick="handleAuth()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 transition-all shadow-lg shadow-blue-900/20">Login to System</button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="app" class="hidden flex h-full w-full gap-4">
        
        <!-- Sidebar (Settings Removed) -->
        <aside class="w-72 glass rounded-[2.5rem] flex flex-col hidden md:flex overflow-hidden">
            <div class="p-4 space-y-3">
                <button onclick="newChat()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold shadow-xl hover:scale-[1.02] transition-all">+ New Chat</button>
                <button onclick="imgBox.showModal()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 p-4 rounded-2xl font-bold shadow-xl hover:scale-[1.02] transition-all">✨ Image Engine</button>
            </div>
            
            <div class="flex-1 p-4">
                <div class="text-[10px] font-bold text-slate-500 uppercase mb-4 px-2">Active Session</div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-xs text-blue-400 font-mono mb-1">Model Status:</p>
                    <p class="text-[10px] text-slate-300 truncate">openai/gpt-oss-120b:free</p>
                </div>
            </div>

            <div class="p-6 border-t border-white/10">
                <button onclick="location.reload()" class="w-full text-center text-slate-500 text-sm font-bold p-2 hover:text-rose-400 transition-colors">Logout</button>
            </div>
        </aside>

        <!-- Chat Container -->
        <main class="flex-1 glass rounded-[3rem] flex flex-col overflow-hidden relative shadow-2xl">
            <header class="h-16 flex items-center justify-between px-10 border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">System Online</span>
                </div>
                <span id="user-display" class="text-xs font-black text-blue-500 uppercase"></span>
            </header>

            <div id="msg-container" class="flex-1 overflow-y-auto p-8 space-y-8 chat-scroll">
                <div class="text-center py-20 opacity-20">
                    <h2 class="text-5xl font-black">HELLO</h2>
                    <p>Ready for your command</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-8">
                <div class="max-w-4xl mx-auto relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[2rem] blur opacity-20 group-focus-within:opacity-40 transition duration-500"></div>
                    <div class="relative flex items-center bg-slate-900 rounded-[2rem] border border-white/10">
                        <input id="user-in" type="text" placeholder="Ask anything..." class="w-full p-5 pr-16 bg-transparent outline-none text-white text-lg" onkeydown="if(event.key==='Enter') send()">
                        <button onclick="send()" class="absolute right-3 bg-blue-600 p-3.5 rounded-2xl hover:bg-blue-500 hover:scale-105 active:scale-95 transition-all shadow-xl">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <dialog id="imgBox" class="bg-transparent m-auto p-4 w-full max-w-lg">
        <div class="glass p-8 rounded-[3rem] shadow-2xl border border-white/10">
            <h2 class="text-2xl font-bold mb-4">Image Generation</h2>
            <div class="space-y-4">
                <textarea id="img-p" class="w-full p-5 rounded-2xl bg-black/40 border border-white/10 h-32 outline-none focus:border-blue-500 transition-all" placeholder="Describe the image..."></textarea>
                <button onclick="genImg()" id="g-btn" class="w-full bg-blue-600 p-4 rounded-2xl font-bold shadow-lg shadow-blue-900/40">Create Art</button>
                <div id="img-res" class="mt-4 rounded-2xl overflow-hidden min-h-[200px] flex items-center justify-center bg-black/40 border border-white/5"></div>
            </div>
            <button onclick="imgBox.close()" class="w-full mt-4 text-slate-500 text-xs font-bold uppercase tracking-widest">Close</button>
        </div>
    </dialog>

    <script>
        // HARDCODED CONFIGURATION - NO SETTINGS NEEDED
        const CONFIG = {
            API_KEY: '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',
            MODEL: 'openai/gpt-oss-120b:free'
        };

        let db = JSON.parse(localStorage.getItem('uniai_users') || '[]');
        let currentChat = { messages: [] };

        function handleAuth() {
            const u = document.getElementById('auth-u').value.trim();
            const p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return;

            let found = db.find(x => x.u === u);
            if(found && found.p === p) start(found);
            else if(!found) {
                let newUser = { u, p };
                db.push(newUser);
                localStorage.setItem('uniai_users', JSON.stringify(db));
                start(newUser);
            } else alert("Wrong Login Details");
        }

        function start(uData) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').textContent = uData.u;
        }

        async function send() {
            const input = document.getElementById('user-in');
            const text = input.value.trim();
            if(!text) return;

            addMsg('user', text);
            input.value = '';

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${CONFIG.API_KEY}`,
                        'HTTP-Referer': 'https://unitynodes.dpdns.org',
                        'X-Title': 'Universal AI Pro'
                    },
                    body: JSON.stringify({ 
                        model: CONFIG.MODEL, 
                        messages: currentChat.messages 
                    })
                });
                const data = await res.json();
                if(data.choices) addMsg('assistant', data.choices[0].message.content);
                else addMsg('assistant', `⚠️ **Error:** ${data.error?.message || "Check API Credit"}`);
            } catch (e) {
                addMsg('assistant', "❌ **Connection Error:** System could not reach AI.");
            }
        }

        function addMsg(role, content) {
            currentChat.messages.push({ role, content });
            const cont = document.getElementById('msg-container');
            
            // Clear initial welcome text if it exists
            if(currentChat.messages.length === 1) cont.innerHTML = '';

            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-300`;
            div.innerHTML = `
                <div class="max-w-[85%] p-5 rounded-[2rem] ${role === 'user' ? 'bg-blue-600 text-white shadow-blue-900/20' : 'glass text-slate-200'} shadow-2xl">
                    ${marked.parse(content)}
                </div>
            `;
            cont.appendChild(div);
            cont.scrollTo({ top: cont.scrollHeight, behavior: 'smooth' });
        }

        function genImg() {
            const p = document.getElementById('img-p').value.trim();
            const out = document.getElementById('img-res');
            const btn = document.getElementById('g-btn');
            if(!p) return;

            btn.disabled = true;
            btn.textContent = "Processing Latent Space...";
            out.innerHTML = `<div class="p-8 text-blue-500 animate-pulse font-mono text-xs tracking-widest">GENERATING_PIXELS...</div>`;

            const seed = Math.floor(Math.random() * 999999);
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            const img = new Image();
            img.src = url;
            img.className = "w-full animate-in zoom-in duration-700";
            img.onload = () => {
                out.innerHTML = '';
                out.appendChild(img);
                btn.disabled = false;
                btn.textContent = "Create Art";
            };
        }

        function newChat() {
            document.getElementById('msg-container').innerHTML = `<div class="text-center py-20 opacity-20"><h2 class="text-5xl font-black">READY</h2><p>New Session Started</p></div>`;
            currentChat = { messages: [] };
        }
    </script>
</body>
</html>
