<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2">

    <!-- Auth -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="glass w-full max-w-sm p-8 rounded-[2rem] text-center">
            <h1 class="text-2xl font-bold text-blue-500 mb-6">UNIVERSAL AI</h1>
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500">Launch Chat</button>
        </div>
    </div>

    <!-- Main -->
    <div id="app" class="hidden w-full h-full max-w-5xl flex gap-3">
        
        <!-- Sidebar -->
        <aside class="w-64 glass rounded-[2rem] flex flex-col hidden md:flex">
            <div class="p-4 border-b border-white/5">
                <button onclick="location.reload()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">New Chat</button>
            </div>
            <div class="p-4 flex-1">
                <div class="bg-white/5 p-3 rounded-xl border border-white/5 text-[10px]">
                    <p class="text-blue-400 font-bold mb-1 uppercase">Active Model</p>
                    <p class="text-slate-400">openai/gpt-oss-120b:free</p>
                </div>
            </div>
            <div class="p-4 border-t border-white/5">
                <button onclick="document.getElementById('set-modal').showModal()" class="w-full text-left text-slate-400 text-sm p-2 hover:bg-white/5 rounded-lg">⚙️ Settings</button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 glass rounded-[2rem] flex flex-col overflow-hidden">
            <header class="h-14 flex items-center px-6 border-b border-white/5">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">System Ready</span>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area"></div>

            <div class="p-6">
                <div class="flex items-center bg-slate-900 rounded-2xl border border-white/10 p-2">
                    <input id="chat-in" type="text" placeholder="Type here..." class="flex-1 p-3 bg-transparent outline-none" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-blue-600 p-3 rounded-xl">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Simple Settings Modal (Extra options removed) -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-xs">
        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-xl font-bold mb-4">API Configuration</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">OpenRouter Key</label>
                    <input type="password" id="api-key-input" class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 outline-none text-white text-sm">
                </div>
                <button onclick="saveKey()" class="w-full bg-blue-600 p-3 rounded-xl font-bold text-sm">Save Key</button>
            </div>
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-4 text-slate-500 text-[10px] uppercase">Close</button>
        </div>
    </dialog>

    <script>
        // API Configuration (Auto-set Model)
        const MODEL = "openai/gpt-oss-120b:free";
        let userKey = localStorage.getItem('user_api_key') || "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";
        let history = [];

        function login() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('api-key-input').value = userKey;
        }

        function saveKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) {
                userKey = key;
                localStorage.setItem('user_api_key', key);
                alert("Key Updated!");
                document.getElementById('set-modal').close();
            }
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            history.push({role: "user", content: text});
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-[85%]">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${userKey}`,
                        "HTTP-Referer": "https://unitynodes.dpdns.org",
                        "X-Title": "Universal AI",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ model: MODEL, messages: history })
                });

                const data = await res.json();
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    history.push({role: "assistant", content: reply});
                    box.innerHTML += `<div class="flex justify-start"><div class="bg-white/10 p-4 rounded-2xl rounded-tl-none max-w-[85%] border border-white/5">${marked.parse(reply)}</div></div>`;
                } else {
                    box.innerHTML += `<div class="text-rose-500 text-[10px] text-center">⚠️ Error: ${data.error?.message || "Invalid Key"}</div>`;
                }
            } catch (e) {
                box.innerHTML += `<div class="text-rose-500 text-[10px] text-center">❌ Connection Error</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
