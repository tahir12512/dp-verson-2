<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI | Premium Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0d1117; 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0;
        }

        /* GitHub Style 3D Background */
        .hero-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, #3245ff 0%, #bc45ff 25%, #0d1117 60%);
            z-index: -1;
        }

        /* Floating 3D Spheres */
        .sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }
        .sphere-1 { width: 400px; height: 400px; background: #3245ff; top: -100px; left: -100px; }
        .sphere-2 { width: 300px; height: 300px; background: #bc45ff; bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .auth-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .unity-input {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid #30363d;
            color: white;
            transition: all 0.3s ease;
        }

        .unity-input:focus {
            border-color: #1f6feb;
            box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.2);
            outline: none;
        }

        /* 3D Button Effect */
        .btn-3d {
            background: linear-gradient(180deg, #2ea44f 0%, #238636 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-3d:active { transform: scale(0.97); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Background Elements -->
    <div class="hero-bg"></div>
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-2"></div>

    <!-- Login UI -->
    <div id="auth-screen" class="w-full max-w-[400px] z-10 animate-in fade-in zoom-in duration-700">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2 text-white">Unity AI</h1>
            <p class="text-slate-300/80 text-sm font-medium">Empowering the future of collaboration</p>
        </div>

        <div class="auth-card p-8 rounded-3xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-widest">Display Name</label>
                    <input type="text" id="user-name" class="w-full p-3.5 rounded-xl unity-input text-sm" placeholder="Your Name">
                </div>

                <div>
                    <label class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-widest">Gmail</label>
                    <input type="email" id="user-email" class="w-full p-3.5 rounded-xl unity-input text-sm" placeholder="user@gmail.com">
                </div>

                <div>
                    <label class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-widest">Secret Key</label>
                    <input type="password" id="user-pass" class="w-full p-3.5 rounded-xl unity-input text-sm" placeholder="••••••••">
                </div>
                
                <button onclick="login()" class="w-full btn-3d text-white font-bold py-4 rounded-xl text-sm shadow-xl mt-2">
                    Initialize Unity Node
                </button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-[11px] text-slate-500 font-medium">
                    By signing in, you agree to our 
                    <span class="text-blue-400 cursor-pointer">Neural Protocols</span>.
                </p>
            </div>
        </div>

        <!-- Footer Links -->
        <div class="mt-10 flex justify-center gap-8 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
            <button onclick="document.getElementById('set-modal').showModal()" class="hover:text-white transition-colors">Config</button>
            <a href="#" class="hover:text-white transition-colors">Documentation</a>
            <a href="#" class="hover:text-white transition-colors">Support</a>
        </div>
    </div>

    <!-- Main Chat Dashboard (Hidden Initially) -->
    <div id="app" class="hidden fixed inset-0 z-50 bg-[#0d1117] flex flex-col lg:flex-row p-4 gap-4">
        <aside class="w-72 bg-[#161b22]/50 border border-white/10 rounded-3xl backdrop-blur-xl p-6 hidden lg:flex flex-col">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-4 h-4 rounded-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                <span class="text-lg font-black tracking-tighter">UNITY AI</span>
            </div>
            <button onclick="location.reload()" class="w-full bg-white/5 p-4 rounded-2xl text-sm font-bold border border-white/10 hover:bg-white/10 transition-all">+ New Session</button>
            <div class="flex-1"></div>
            <button onclick="location.reload()" class="text-xs text-slate-500 font-bold hover:text-rose-400 transition-colors uppercase">Terminate Session</button>
        </aside>

        <main class="flex-1 bg-[#161b22]/30 border border-white/10 rounded-[2rem] backdrop-blur-2xl flex flex-col overflow-hidden">
            <header class="h-16 border-b border-white/5 flex items-center px-10 justify-between">
                <div id="user-display" class="text-xs font-black tracking-widest text-blue-400 uppercase"></div>
                <div class="flex gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-slate-500 tracking-widest">SECURE LINK</span>
                </div>
            </header>
            <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8 chat-container"></div>
            <div class="p-8">
                <div class="max-w-4xl mx-auto bg-[#0d1117]/80 border border-white/10 rounded-2xl p-2 flex items-center focus-within:border-blue-500 transition-all shadow-2xl">
                    <input id="chat-in" type="text" placeholder="Command Unity AI..." class="flex-1 p-4 bg-transparent outline-none text-sm font-medium" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl shadow-lg transition-all active:scale-95">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-sm">
        <div class="bg-[#161b22] border border-white/10 p-10 rounded-[2rem] shadow-2xl backdrop-blur-3xl">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">System Config</h2>
            <div class="space-y-4">
                <input type="password" id="api-key" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 outline-none text-xs" placeholder="OpenRouter API Key">
                <input type="text" id="model-name" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 outline-none text-xs" placeholder="Model ID">
                <button onclick="saveSettings()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-sm shadow-lg hover:bg-blue-500">Save Node Params</button>
            </div>
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-6 text-[10px] text-slate-500 font-black uppercase">Close</button>
        </div>
    </dialog>

    <script>
        // All previous logic from previous versions remains intact
        let config = {
            key: localStorage.getItem('u_key') || "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",
            model: localStorage.getItem('u_model') || "openai/gpt-oss-120b:free"
        };
        let history = [];

        function login() {
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            if(!name || !email || !pass) return alert("Complete the protocol (fill all fields)!");
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').textContent = "OPERATOR: " + name;
            document.getElementById('api-key').value = config.key;
            document.getElementById('model-name').value = config.model;
        }

        function saveSettings() {
            config.key = document.getElementById('api-key').value;
            config.model = document.getElementById('model-name').value;
            localStorage.setItem('u_key', config.key);
            localStorage.setItem('u_model', config.model);
            document.getElementById('set-modal').close();
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-5 rounded-3xl rounded-tr-none max-w-[80%] text-sm font-medium shadow-2xl">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const aiId = 'u-' + Date.now();
            box.innerHTML += `<div class="flex justify-start"><div id="${aiId}" class="bg-white/5 border border-white/10 p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed shadow-sm">Syncing with Node...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${config.key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: config.model, messages: [...history, {role: "user", content: text}] })
                });

                const data = await res.json();
                const aiDiv = document.getElementById(aiId);
                
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    history.push({role: "user", content: text}, {role: "assistant", content: reply});
                    aiDiv.innerHTML = marked.parse(reply);
                    box.scrollTop = box.scrollHeight;
                } else {
                    aiDiv.innerHTML = "⚠️ Node Error: Check Config.";
                }
            } catch (e) {
                document.getElementById(aiId).innerHTML = "❌ Connection Failed.";
            }
        }
    </script>
</body>
</html>
