<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI | Dual Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: white; height: 100vh; overflow: hidden; }
        
        .hero-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, #3245ff 0%, #bc45ff 25%, #0d1117 60%); z-index: -1; }
        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .unity-input { background: rgba(13, 17, 23, 0.9); border: 1px solid #30363d; color: white; }
        .unity-input:focus { border-color: #1f6feb; box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.2); outline: none; }
        
        .tab-active { background: #1f6feb !important; color: white !important; box-shadow: 0 0 15px rgba(31, 111, 235, 0.4); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="hero-bg"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="w-full max-w-[380px] z-10 p-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black tracking-tighter italic text-white drop-shadow-2xl">UNITY AI</h1>
            <p class="text-slate-400 text-sm mt-3 font-medium tracking-wide">Enter the Secure Neural Node</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl border-white/5">
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Full Name" class="w-full p-4 rounded-2xl unity-input text-sm">
                <input type="email" id="auth-email" placeholder="Gmail Address" class="w-full p-4 rounded-2xl unity-input text-sm">
                <input type="password" id="auth-pass" placeholder="Secret Password" class="w-full p-4 rounded-2xl unity-input text-sm">
                <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-sm shadow-xl transition-all active:scale-95 mt-2">
                    Initialize Link
                </button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="app" class="hidden fixed inset-0 z-50 bg-[#0d1117] flex flex-col lg:flex-row p-4 gap-4">
        <!-- Sidebar -->
        <aside class="w-72 glass rounded-[2rem] flex flex-col p-6 hidden lg:flex">
            <div class="mb-8 flex justify-between items-center px-2">
                <span class="text-xl font-black tracking-tighter italic">UNITY</span>
                <span id="role-tag" class="text-[9px] bg-white/10 text-slate-300 px-3 py-1 rounded-full font-black border border-white/5">NODE</span>
            </div>

            <div class="flex-1 overflow-y-auto chat-container pr-2">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-4">Neural History</p>
                <div id="history-list" class="space-y-3"></div>
            </div>

            <div class="pt-6 border-t border-white/5 space-y-3">
                <button onclick="logout()" class="w-full p-4 bg-rose-500/10 text-rose-500 rounded-2xl text-[10px] font-black tracking-widest hover:bg-rose-500/20 transition-all uppercase">Terminate</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 glass rounded-[3rem] flex flex-col overflow-hidden relative border-white/5">
            <!-- Top Options (Chat / Image) -->
            <header class="h-20 border-b border-white/5 flex items-center px-10 justify-between bg-black/20">
                <div class="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                    <button onclick="switchTab('chat')" id="tab-chat" class="px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 tab-active">Chat Bot</button>
                    <button onclick="switchTab('image')" id="tab-image" class="px-6 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">Text to Image</button>
                </div>
                
                <div id="image-options" class="hidden flex items-center gap-3">
                    <span class="text-[10px] font-black text-slate-500 tracking-tighter">ENGINE:</span>
                    <select id="img-engine" class="bg-blue-600/10 border border-blue-500/20 rounded-lg text-[10px] p-1.5 outline-none text-blue-400 font-black">
                        <option value="veo2">VEO 2 (Ultra)</option>
                        <option value="veo3">VEO 3 (Extreme)</option>
                        <option value="grok">GROK 3D</option>
                        <option value="nano">NANO BANANA</option>
                    </select>
                </div>
            </header>

            <!-- Dynamic Viewport -->
            <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8 chat-container"></div>

            <!-- Input System -->
            <div class="p-8">
                <div class="max-w-4xl mx-auto bg-black/40 border border-white/10 rounded-[1.5rem] p-2 flex items-center focus-within:border-blue-500 transition-all">
                    <input id="main-in" type="text" placeholder="Type a message..." class="flex-1 p-4 bg-transparent outline-none text-sm font-medium" onkeydown="if(event.key==='Enter') execute()">
                    <button onclick="execute()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl shadow-lg transition-all active:scale-90">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentMode = 'chat'; // 'chat' or 'image'
        let currentUser = JSON.parse(sessionStorage.getItem('activeUser')) || null;
        let users = JSON.parse(localStorage.getItem('unityUsers')) || [];

        window.onload = () => { if(currentUser) renderApp(); };

        function handleAuth() {
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!name || !email || !pass) return alert("Fill all security fields!");

            let user = users.find(u => u.email === email);
            if(user) {
                if(user.pass !== pass) return alert("Wrong Access Key!");
                currentUser = user;
            } else {
                const role = users.length === 0 ? 'ADMIN' : 'USER';
                user = { name, email, pass, role, history: [] };
                users.push(user);
                localStorage.setItem('unityUsers', JSON.stringify(users));
                currentUser = user;
            }
            sessionStorage.setItem('activeUser', JSON.stringify(currentUser));
            renderApp();
        }

        function renderApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('role-tag').textContent = currentUser.role;
            updateHistory();
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-chat').classList.toggle('tab-active', mode === 'chat');
            document.getElementById('tab-image').classList.toggle('tab-active', mode === 'image');
            document.getElementById('image-options').style.display = mode === 'image' ? 'flex' : 'none';
            document.getElementById('main-in').placeholder = mode === 'image' ? "Describe the image you want to create..." : "Type your message...";
            document.getElementById('chat-box').innerHTML = ""; // Clear view on switch
        }

        function execute() {
            const input = document.getElementById('main-in');
            const text = input.value.trim();
            if(!text) return;

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="flex justify-end animate-slide"><div class="bg-blue-600 p-5 rounded-3xl rounded-tr-none max-w-[80%] text-sm font-medium shadow-2xl">${text}</div></div>`;
            input.value = "";

            if(currentMode === 'image') generateImage(text);
            else getChatResponse(text);
            
            box.scrollTop = box.scrollHeight;
        }

        function generateImage(prompt) {
            const box = document.getElementById('chat-box');
            const engine = document.getElementById('img-engine').value;
            const id = 'img-' + Date.now();
            
            box.innerHTML += `<div class="flex justify-start animate-slide"><div id="${id}" class="glass p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm">💠 Initializing Image Engine: ${engine.toUpperCase()}...</div></div>`;
            
            setTimeout(() => {
                const qualityTags = "masterpiece, 8k, highly detailed, professional photography, cinematic, sharp focus";
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt + ", " + qualityTags)}?seed=${Math.random()}&width=1024&height=1024&nologo=true`;
                
                document.getElementById(id).innerHTML = `
                    <div class="space-y-4">
                        <img src="${imgUrl}" class="rounded-2xl w-full border border-white/10 shadow-2xl" onload="document.getElementById('chat-box').scrollTop = 100000">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-blue-400 tracking-widest uppercase">Result: ${engine}</span>
                            <a href="${imgUrl}" target="_blank" class="text-[9px] bg-white/5 px-3 py-1 rounded-full text-slate-400 hover:text-white transition-all">HD DOWNLOAD</a>
                        </div>
                    </div>
                `;
                saveHistory("🖼️ " + prompt);
            }, 2500);
        }

        async function getChatResponse(text) {
            const box = document.getElementById('chat-box');
            const id = 'ai-' + Date.now();
            box.innerHTML += `<div class="flex justify-start animate-slide"><div id="${id}" class="glass p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">Processing Neural Path...</div></div>`;
            
            // Simulation
            setTimeout(() => {
                const reply = `Unity AI is operating in ${currentUser.role} mode. How can I assist further with your development?`;
                document.getElementById(id).innerHTML = marked.parse(reply);
                saveHistory("💬 " + text);
            }, 1200);
        }

        function saveHistory(item) {
            currentUser.history.unshift(item);
            if(currentUser.history.length > 15) currentUser.history.pop();
            const idx = users.findIndex(u => u.email === currentUser.email);
            users[idx].history = currentUser.history;
            localStorage.setItem('unityUsers', JSON.stringify(users));
            sessionStorage.setItem('activeUser', JSON.stringify(currentUser));
            updateHistory();
        }

        function updateHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = currentUser.history.map(h => `
                <div class="p-4 text-[11px] bg-white/[0.03] rounded-2xl border border-white/5 truncate text-slate-400 font-medium hover:bg-white/5 cursor-pointer transition-all">
                    ${h}
                </div>
            `).join('');
        }

        function logout() { sessionStorage.removeItem('activeUser'); location.reload(); }
    </script>
</body>
</html>
