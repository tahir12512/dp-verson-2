<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI - Ultra Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Animated Background */
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-bubble { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased transition-colors duration-300">

    <!-- Auth System -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
            <h1 class="text-3xl font-bold mb-2">Welcome</h1>
            <p class="text-sm text-gray-500 mb-6">First user to sign up becomes the Admin.</p>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Username" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-300 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-300 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleAuth()" class="w-full bg-black text-white p-3 rounded-xl font-bold hover:opacity-80 transition-all">Enter System</button>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="hidden flex h-screen w-full overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 glass-panel m-2 rounded-2xl flex flex-col hidden md:flex">
            <div class="p-4 flex flex-col gap-2">
                <button onclick="createNewChat()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-medium shadow-md">+ New Chat</button>
                <button onclick="openImageModal()" class="w-full bg-purple-600 text-white p-3 rounded-xl font-medium shadow-md">✨ Image Gen</button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
            <div class="p-4 border-t space-y-2">
                <div id="role-tag" class="text-[10px] uppercase font-bold text-blue-500 px-2"></div>
                <button id="admin-btn" onclick="openAdmin()" class="hidden w-full text-left p-2 text-red-500 hover:bg-red-50 rounded-lg">🛠 Admin Panel</button>
                <button onclick="openSettings()" class="w-full text-left p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">⚙️ Settings</button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col m-2 glass-panel rounded-2xl overflow-hidden relative">
            <header class="h-14 flex items-center justify-between px-6 border-b">
                <span id="chat-title" class="font-bold truncate max-w-[200px]">New Conversation</span>
                <div class="flex gap-4">
                    <button onclick="toggleDarkMode()">🌓</button>
                    <button onclick="location.reload()" class="text-sm">Logout</button>
                </div>
            </header>

            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

            <div class="p-4">
                <div class="max-w-4xl mx-auto flex items-center gap-2 bg-white dark:bg-gray-800 p-2 rounded-2xl shadow-xl ring-1 ring-gray-200 dark:ring-gray-700">
                    <input id="user-input" type="text" class="flex-1 p-3 bg-transparent outline-none" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white p-3 rounded-xl">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <dialog id="image-dialog" class="bg-transparent m-auto p-4 w-full max-w-lg">
        <div class="glass-panel p-6 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Unlimited Free Images</h2>
            <div class="space-y-4">
                <select id="model-select" class="w-full p-3 rounded-xl ring-1 ring-gray-200 dark:bg-gray-900">
                    <option value="nano-banana">Nano Banana 2 (Standard)</option>
                    <option value="veo-3">Veo 3 (Extreme High-Res)</option>
                    <option value="veo-2">Veo 2 (Fast Generation)</option>
                    <option value="veo-ultra">Veo Ultra (Cinematic)</option>
                </select>
                <textarea id="image-prompt" class="w-full p-3 rounded-xl ring-1 ring-gray-200 dark:bg-gray-900 h-24" placeholder="Describe your image..."></textarea>
                <button onclick="generateImageNow()" id="gen-btn" class="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">Generate for Free</button>
                <div id="image-output" class="mt-4 rounded-xl overflow-hidden min-h-[100px] flex items-center justify-center bg-gray-100/50"></div>
            </div>
            <button onclick="this.closest('dialog').close()" class="mt-4 text-gray-500 text-sm w-full">Close</button>
        </div>
    </dialog>

    <dialog id="admin-dialog" class="bg-transparent m-auto p-4 w-full max-w-md">
        <div class="glass-panel p-6 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-red-600">Admin Panel</h2>
            <div id="user-list" class="space-y-2"></div>
            <button onclick="this.closest('dialog').close()" class="mt-6 w-full p-2 bg-gray-200 rounded-xl">Exit</button>
        </div>
    </dialog>

    <script>
        let currentUser = null;
        let dbUsers = JSON.parse(localStorage.getItem('users') || '[]');
        let chats = [];

        function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return alert("Enter credentials");

            let user = dbUsers.find(x => x.username === u);
            if(user) {
                if(user.password === p) {
                    login(user);
                } else {
                    alert("Wrong password");
                }
            } else {
                user = { username: u, password: p, role: dbUsers.length === 0 ? 'admin' : 'user' };
                dbUsers.push(user);
                localStorage.setItem('users', JSON.stringify(dbUsers));
                login(user);
            }
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('role-tag').textContent = user.role;
            if(user.role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
            createNewChat();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const chat = chats[0];
            chat.messages.push({ role: 'user', content: text });
            input.value = '';
            renderMessages();

            // Simulate "Fast Chat" logic
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${localStorage.getItem('api_key') || ''}` 
                    },
                    body: JSON.stringify({
                        model: localStorage.getItem('model_id') || 'deepseek/deepseek-r1:free',
                        messages: chat.messages
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                chat.messages.push({ role: 'assistant', content: aiMsg });
                renderMessages();
            } catch (e) {
                chat.messages.push({ role: 'assistant', content: "⚠️ Error: Please set your API Key in Settings." });
                renderMessages();
            }
        }

        function generateImageNow() {
            const prompt = document.getElementById('image-prompt').value;
            const btn = document.getElementById('gen-btn');
            const output = document.getElementById('image-output');
            
            if(!prompt) return alert("Type a prompt");
            
            btn.disabled = true;
            btn.textContent = "Processing...";
            output.innerHTML = `<div class="animate-pulse text-sm">Generating AI Art...</div>`;

            // Using Pollinations for instant, free, unlimited generation
            const seed = Math.floor(Math.random() * 100000);
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            const img = new Image();
            img.src = imgUrl;
            img.className = "w-full rounded-xl cursor-pointer hover:scale-[1.02] transition-transform";
            img.onclick = () => window.open(imgUrl);
            img.onload = () => {
                output.innerHTML = "";
                output.appendChild(img);
                btn.disabled = false;
                btn.textContent = "Generate for Free";
            };
        }

        function renderMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = chats[0].messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} chat-bubble">
                    <div class="max-w-[80%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 shadow-sm'}">
                        ${marked.parse(m.content)}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function openAdmin() {
            const list = document.getElementById('user-list');
            list.innerHTML = dbUsers.map(u => `
                <div class="flex justify-between items-center p-2 border-b">
                    <span>${u.username} (${u.role})</span>
                    ${u.role !== 'admin' ? `<button onclick="deleteUser('${u.username}')" class="text-xs text-red-500">Remove</button>` : ''}
                </div>
            `).join('');
            document.getElementById('admin-dialog').showModal();
        }

        function deleteUser(name) {
            dbUsers = dbUsers.filter(x => x.username !== name);
            localStorage.setItem('users', JSON.stringify(dbUsers));
            openAdmin();
        }

        function createNewChat() {
            chats.unshift({ id: Date.now(), messages: [], title: "New Chat" });
            renderMessages();
        }

        function openImageModal() { document.getElementById('image-dialog').showModal(); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function openSettings() { 
            const key = prompt("Enter OpenRouter API Key:", localStorage.getItem('api_key') || "");
            if(key !== null) localStorage.setItem('api_key', key);
        }
    </script>
</body>
</html>
