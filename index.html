<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #1e1b4b; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 md:p-4">

    <!-- Auth Section -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-white/20">
            <h1 class="text-3xl font-black text-blue-500 mb-2">UNIVERSAL AI</h1>
            <p class="text-slate-500 text-xs mb-8 uppercase tracking-widest">Secure Chat Interface</p>
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 shadow-lg transition-all">Launch System</button>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app" class="hidden w-full h-full flex gap-4">
        
        <!-- Sidebar -->
        <aside class="w-72 glass rounded-[2.5rem] flex flex-col hidden lg:flex overflow-hidden">
            <div class="p-6 border-b border-white/5">
                <button onclick="location.reload()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">+ New Chat</button>
            </div>
            
            <!-- History/Info Space -->
            <div class="flex-1 p-6 space-y-4">
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">Active Model</p>
                    <p id="active-model-display" class="text-xs text-slate-300 truncate">openai/gpt-oss-120b:free</p>
                </div>
            </div>

            <!-- Sidebar Bottom (Settings & Logout) -->
            <div class="p-6 border-t border-white/10 space-y-2">
                <button onclick="document.getElementById('set-modal').showModal()" class="w-full flex items-center gap-3 p-3 text-slate-300 hover:bg-white/5 rounded-xl transition-all">
                    <span>⚙️</span> <span class="text-sm font-medium">Settings</span>
                </button>
                <button onclick="location.reload()" class="w-full flex items-center gap-3 p-3 text-slate-500 hover:bg-rose-500/10 hover:text-rose-400 rounded-xl transition-all">
                    <span>🚪</span> <span class="text-sm font-medium">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Chat Container -->
        <main class="flex-1 glass rounded-[3rem] flex flex-col overflow-hidden shadow-2xl">
            <header class="h-16 flex items-center px-10 border-b border-white/5 justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Server: Online</span>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6 chat-area"></div>

            <!-- Input Area -->
            <div class="p-8 bg-gradient-to-t from-slate-900/50 to-transparent">
                <div class="max-w-4xl mx-auto flex items-center bg-slate-900/80 rounded-[2rem] border border-white/10 p-2 focus-within:border-blue-500/50 transition-all shadow-2xl">
                    <input id="chat-in" type="text" placeholder="Send a message..." class="flex-1 p-4 bg-transparent outline-none text-white" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-blue-600 p-4 rounded-2xl hover:bg-blue-500 active:scale-90 transition-all">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Full Settings Modal (Matches Screenshot 2026-05-03 163731_3.jpg) -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-md">
        <div class="glass p-10 rounded-[3rem] shadow-2xl border border-white/20">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">⚙️ Settings</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[11px] text-slate-500 font-bold uppercase ml-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk-or-v1-..." class="w-full mt-1 p-4 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 text-white text-sm">
                </div>
                
                <div>
                    <label class="text-[11px] text-slate-500 font-bold uppercase ml-1">Model ID</label>
                    <input type="text" id="model-id-input" class="w-full mt-1 p-4 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 text-white text-sm">
                    <p class="text-[9px] text-slate-600 mt-1 ml-1">Default: openai/gpt-oss-120b:free</p>
                </div>

                <div>
                    <label class="text-[11px] text-slate-500 font-bold uppercase ml-1">System Prompt</label>
                    <textarea id="system-prompt" class="w-full mt-1 p-4 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 text-white text-sm h-24 resize-none" placeholder="You are a helpful AI assistant."></textarea>
                </div>

                <button onclick="saveSettings()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-blue-500 transition-all">Save Changes</button>
            </div>
            
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-4 text-slate-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition-all">Dismiss</button>
        </div>
    </dialog>

    <script>
        // Load configurations
        let config = {
            key: localStorage.getItem('ai_key') || "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",
            model: localStorage.getItem('ai_model') || "openai/gpt-oss-120b:free",
            system: localStorage.getItem('ai_system') || "You are a helpful AI assistant."
        };

        let history = [];

        function login() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            
            // Sync values to UI
            document.getElementById('api-key-input').value = config.key;
            document.getElementById('model-id-input').value = config.model;
            document.getElementById('system-prompt').value = config.system;
            document.getElementById('active-model-display').textContent = config.model;
        }

        function saveSettings() {
            config.key = document.getElementById('api-key-input').value.trim();
            config.model = document.getElementById('model-id-input').value.trim() || "openai/gpt-oss-120b:free";
            config.system = document.getElementById('system-prompt').value.trim();

            localStorage.setItem('ai_key', config.key);
            localStorage.setItem('ai_model', config.model);
            localStorage.setItem('ai_system', config.system);

            document.getElementById('active-model-display').textContent = config.model;
            alert("Configuration Saved!");
            document.getElementById('set-modal').close();
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            if(history.length === 0) history.push({role: "system", content: config.system});

            history.push({role: "user", content: text});
            box.innerHTML += `<div class="flex justify-end animate-in slide-in-from-right-4 duration-300"><div class="bg-blue-600 p-4 rounded-3xl rounded-tr-none max-w-[80%] shadow-xl">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "HTTP-Referer": "https://unitynodes.dpdns.org",
                        "X-Title": "Universal AI Pro",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ model: config.model, messages: history })
                });

                const data = await res.json();
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    history.push({role: "assistant", content: reply});
                    box.innerHTML += `<div class="flex justify-start animate-in slide-in-from-left-4 duration-300"><div class="glass p-5 rounded-3xl rounded-tl-none max-w-[85%] border border-white/5 shadow-2xl">${marked.parse(reply)}</div></div>`;
                } else {
                    box.innerHTML += `<div class="text-rose-500 text-[10px] text-center font-bold">⚠️ ${data.error?.message || "Check API Key"}</div>`;
                }
            } catch (e) {
                box.innerHTML += `<div class="text-rose-500 text-[10px] text-center">❌ Network Failure</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
