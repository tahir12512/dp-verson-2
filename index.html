<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: white; height: 100vh; overflow: hidden; }
        
        .auth-bg {
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
        }

        .auth-card {
            background: #161b22;
            border: 1px solid #30363d;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .unity-input {
            background: #0d1117;
            border: 1px solid #30363d;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .unity-input:focus {
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
            outline: none;
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="auth-bg flex items-center justify-center p-4">

    <!-- Unity Login Page -->
    <div id="auth-screen" class="w-full max-w-[340px] animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-8">
            <div class="text-3xl font-bold tracking-tighter mb-2">Unity AI</div>
            <p class="text-slate-400 text-sm">Sign in to continue to Unity Nodes</p>
        </div>

        <div class="auth-card p-6 rounded-xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold mb-2 text-slate-300">Username or display name</label>
                    <input type="text" id="user-name" class="w-full p-2.5 rounded-lg unity-input text-sm" placeholder="Enter name">
                </div>
                
                <button onclick="login()" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-md">
                    Sign in
                </button>
            </div>
            
            <div class="mt-6 pt-6 border-t border-[#30363d] text-center">
                <p class="text-xs text-slate-400">New to Unity AI? <button onclick="document.getElementById('set-modal').showModal()" class="text-[#2f81f7] hover:underline">Create an account</button></p>
            </div>
        </div>

        <div class="mt-8 text-center flex justify-center gap-4 text-[11px] text-slate-500">
            <a href="#" class="hover:text-blue-400">Terms</a>
            <a href="#" class="hover:text-blue-400">Privacy</a>
            <a href="#" class="hover:text-blue-400">Docs</a>
            <button onclick="document.getElementById('set-modal').showModal()" class="hover:text-blue-400 font-bold">Settings</button>
        </div>
    </div>

    <!-- Interface Dashboard -->
    <div id="app" class="hidden fixed inset-0 z-50 bg-[#0d1117] flex flex-col lg:flex-row p-3 gap-3">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#161b22] border border-[#30363d] rounded-2xl flex flex-col hidden lg:flex">
            <div class="p-5 border-b border-[#30363d] flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                <span class="font-bold text-sm">Unity AI</span>
            </div>
            <div class="flex-1 p-4 space-y-2 overflow-y-auto chat-scroll">
                <button onclick="location.reload()" class="w-full text-left p-3 hover:bg-[#21262d] rounded-lg text-sm text-slate-300 font-medium">+ New Chat</button>
            </div>
            <div class="p-4 border-t border-[#30363d] space-y-1">
                <button onclick="document.getElementById('set-modal').showModal()" class="w-full text-left p-2.5 hover:bg-[#21262d] rounded-lg text-xs text-slate-400 flex items-center gap-2">
                    <span>⚙️</span> Configuration
                </button>
                <button onclick="location.reload()" class="w-full text-left p-2.5 hover:bg-rose-500/5 hover:text-rose-400 rounded-lg text-xs flex items-center gap-2">
                    <span>🚪</span> Sign out
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 bg-[#161b22] border border-[#30363d] rounded-2xl flex flex-col overflow-hidden relative">
            <header class="h-14 border-b border-[#30363d] flex items-center px-6 justify-between bg-white/[0.01]">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-[#2f81f7]" id="user-display"></span>
                </div>
                <div class="flex gap-2">
                    <span class="px-2 py-0.5 rounded-full bg-green-500/10 text-green-500 text-[9px] font-bold border border-green-500/20 uppercase">Node Active</span>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 chat-scroll"></div>

            <div class="p-6">
                <div class="max-w-4xl mx-auto flex items-center bg-[#0d1117] border border-[#30363d] rounded-xl p-1 focus-within:border-[#2f81f7] transition-all">
                    <input id="chat-in" type="text" placeholder="Type a message..." class="flex-1 p-3 bg-transparent outline-none text-sm" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-[#1f6feb] hover:bg-[#388bfd] p-3 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings (Account Creation Sim) -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-sm">
        <div class="bg-[#161b22] border border-[#30363d] p-8 rounded-2xl shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Internal Config</h2>
            <div class="space-y-4 text-sm text-slate-300">
                <div>
                    <label class="block mb-1 text-xs">OpenRouter Key</label>
                    <input type="password" id="api-key" class="w-full p-2.5 rounded-lg bg-[#0d1117] border border-[#30363d] outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block mb-1 text-xs">Model ID</label>
                    <input type="text" id="model-name" class="w-full p-2.5 rounded-lg bg-[#0d1117] border border-[#30363d] outline-none focus:border-blue-500">
                </div>
                <button onclick="saveSettings()" class="w-full bg-[#238636] p-2.5 rounded-lg font-bold mt-2">Apply Settings</button>
            </div>
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-4 text-[10px] text-slate-500 uppercase font-black hover:text-white">Cancel</button>
        </div>
    </dialog>

    <script>
        let config = {
            key: localStorage.getItem('u_key') || "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",
            model: localStorage.getItem('u_model') || "openai/gpt-oss-120b:free"
        };
        let history = [];

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').textContent = name.toUpperCase();
            document.getElementById('api-key').value = config.key;
            document.getElementById('model-name').value = config.model;
        }

        function saveSettings() {
            config.key = document.getElementById('api-key').value;
            config.model = document.getElementById('model-name').value;
            localStorage.setItem('u_key', config.key);
            localStorage.setItem('u_model', config.model);
            document.getElementById('set-modal').close();
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="flex justify-end animate-in fade-in slide-in-from-right-4"><div class="bg-[#1f6feb] p-3.5 rounded-xl rounded-tr-none max-w-[80%] text-sm shadow-md">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const aiId = 'u-' + Date.now();
            box.innerHTML += `<div class="flex justify-start animate-in fade-in slide-in-from-left-4"><div id="${aiId}" class="bg-[#21262d] border border-[#30363d] p-3.5 rounded-xl rounded-tl-none max-w-[85%] text-sm">...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "HTTP-Referer": "https://unitynodes.dpdns.org",
                        "X-Title": "Unity AI",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ model: config.model, messages: [...history, {role: "user", content: text}] })
                });

                const data = await res.json();
                const aiDiv = document.getElementById(aiId);
                
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    history.push({role: "user", content: text}, {role: "assistant", content: reply});
                    
                    // Ultra Fast Smooth Typing
                    aiDiv.innerHTML = "";
                    let idx = 0;
                    function type() {
                        if (idx < reply.length) {
                            aiDiv.innerHTML = marked.parse(reply.substring(0, idx + 10));
                            idx += 10;
                            box.scrollTop = box.scrollHeight;
                            setTimeout(type, 1);
                        } else {
                            aiDiv.innerHTML = marked.parse(reply);
                        }
                    }
                    type();
                } else {
                    aiDiv.innerHTML = "⚠️ API Error: Check your key.";
                }
            } catch (e) {
                document.getElementById(aiId).innerHTML = "❌ Unity AI node error.";
            }
        }
    </script>
</body>
</html>
