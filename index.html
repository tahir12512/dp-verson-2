<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background: #0f172a;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased overflow-hidden flex flex-col items-center justify-center p-4">

    <!-- Simple Login Overlay -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="glass w-full max-w-sm p-8 rounded-[2rem] text-center">
            <h1 class="text-3xl font-black text-blue-500 mb-6">UNIVERSAL AI</h1>
            <input type="text" id="user-name" placeholder="Enter Name" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500">Login Now</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden w-full h-full max-w-6xl flex gap-4">
        
        <!-- Sidebar -->
        <aside class="w-64 glass rounded-[2rem] flex flex-col hidden lg:flex overflow-hidden">
            <div class="p-4 border-b border-white/5">
                <button onclick="location.reload()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">+ New Chat</button>
            </div>
            <div class="p-6 flex-1 text-xs text-slate-500 space-y-4">
                <div>
                    <p class="font-bold text-blue-400">MODEL</p>
                    <p class="truncate">openai/gpt-oss-120b:free</p>
                </div>
                <div>
                    <p class="font-bold text-blue-400">STATUS</p>
                    <p>Connected & Secure</p>
                </div>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="flex-1 glass rounded-[2rem] flex flex-col overflow-hidden">
            <header class="h-14 flex items-center px-6 border-b border-white/5 justify-between">
                <span class="text-xs font-bold text-slate-400">GPT-OSS 120B FREE ENGINE</span>
                <span id="display-name" class="text-xs font-bold text-blue-400"></span>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-container"></div>

            <div class="p-6">
                <div class="flex items-center bg-slate-900/80 rounded-2xl border border-white/10 p-2 shadow-2xl">
                    <input id="chat-input" type="text" placeholder="Type here..." class="flex-1 p-3 bg-transparent outline-none" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // HARDCODED SECURE KEY
        const API_KEY = "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";
        const MODEL = "openai/gpt-oss-120b:free";
        
        let history = [];

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Please enter a name");
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-name').textContent = name.toUpperCase();
        }

        async function send() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();

            if(!text) return;

            // Add User Message
            history.push({role: "user", content: text});
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-[80%]">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "HTTP-Referer": "https://unitynodes.dpdns.org", // Required to fix 'User not found'
                        "X-Title": "UnityNodes AI", // Required
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: history
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const aiMsg = data.choices[0].message.content;
                    history.push({role: "assistant", content: aiMsg});
                    box.innerHTML += `<div class="flex justify-start"><div class="bg-white/10 p-4 rounded-2xl rounded-tl-none max-w-[80%] border border-white/5">${marked.parse(aiMsg)}</div></div>`;
                } else {
                    const errorMsg = data.error?.message || "Unknown error occurred.";
                    box.innerHTML += `<div class="text-rose-500 text-xs text-center">⚠️ Error: ${errorMsg}</div>`;
                }
            } catch (err) {
                box.innerHTML += `<div class="text-rose-500 text-xs text-center">❌ Network Failed. Please refresh.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
