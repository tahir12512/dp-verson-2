<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI - Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
        }
        .message-anim { animation: pop 0.25s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-hidden">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="glass w-full max-w-md p-8 rounded-[2rem] shadow-2xl text-center">
            <h1 class="text-3xl font-bold mb-2">Universal AI</h1>
            <p class="text-slate-400 text-sm mb-8">Login or Create Account</p>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Username" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all">Continue</button>
            </div>
        </div>
    </div>

    <!-- Main Interface -->
    <div id="app" class="hidden flex h-screen w-full p-4 gap-4">
        
        <!-- Sidebar -->
        <aside class="w-72 glass rounded-[2rem] flex flex-col overflow-hidden">
            <div class="p-4 flex flex-col gap-3 border-b border-white/5">
                <button onclick="createNewChat()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">+ New Chat</button>
                <button onclick="openImageModal()" class="w-full bg-purple-600/80 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-purple-700 transition-all">✨ Image Gen</button>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            
            <div class="p-4 border-t border-white/5 space-y-3">
                <div id="role-tag" class="text-[10px] font-black uppercase tracking-widest text-blue-400 text-center"></div>
                <button id="admin-btn" onclick="openAdmin()" class="hidden w-full flex items-center gap-3 p-3 text-rose-400 hover:bg-rose-500/10 rounded-xl">🛠 Admin Panel</button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl">⚙️ Settings</button>
                <button onclick="location.reload()" class="w-full flex items-center gap-3 p-3 text-slate-500 hover:bg-white/5 rounded-xl">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 glass rounded-[2rem] flex flex-col overflow-hidden relative">
            <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
                <span id="chat-title" class="font-bold text-slate-100">New Conversation</span>
                <button onclick="toggleDarkMode()" class="p-2 glass rounded-lg">🌓</button>
            </header>

            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

            <div class="p-6">
                <div class="max-w-4xl mx-auto flex items-center gap-3 bg-slate-900/50 p-2 rounded-[1.5rem] border border-white/10 focus-within:border-blue-500/50 transition-all">
                    <input id="user-input" type="text" class="flex-1 p-4 bg-transparent outline-none text-white" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white p-4 rounded-xl hover:scale-105 transition-all">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Improved Settings Modal (Matches your image layout) -->
    <dialog id="settings-dialog" class="bg-transparent m-auto p-4 w-full max-w-md backdrop:bg-slate-950/80">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl border border-white/20">
            <h2 class="text-2xl font-bold mb-6">Settings</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">OpenRouter API Key</label>
                    <input type="password" id="set-api-key" class="w-full mt-1 p-4 rounded-2xl bg-slate-950/50 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Model ID</label>
                    <input type="text" id="set-model-id" class="w-full mt-1 p-4 rounded-2xl bg-slate-950/50 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                    <p class="text-[10px] text-slate-500 mt-1">Example: deepseek/deepseek-r1:free</p>
                </div>
                <button onclick="saveGlobalSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all">Save Changes</button>
            </div>
            <button onclick="this.closest('dialog').close()" class="mt-4 w-full text-slate-500 text-xs">Close</button>
        </div>
    </dialog>

    <!-- Image Modal -->
    <dialog id="image-dialog" class="bg-transparent m-auto p-4 w-full max-w-lg">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">Pro Image Engine</h2>
            <div class="space-y-4">
                <select id="img-engine" class="w-full p-4 rounded-2xl bg-slate-950/50 border border-slate-700 outline-none">
                    <option value="nano-banana">Nano Banana 2</option>
                    <option value="veo-3">Veo 3 Ultra</option>
                    <option value="veo-2">Veo 2</option>
                    <option value="veo-ultra">Veo Ultra Cinematic</option>
                </select>
                <textarea id="img-prompt" class="w-full p-4 rounded-2xl bg-slate-950/50 border border-slate-700 h-32 outline-none" placeholder="A futuristic city in the clouds..."></textarea>
                <button onclick="triggerImageGen()" id="gen-btn" class="w-full bg-purple-600 text-white p-4 rounded-2xl font-bold">Generate Unlimited Free</button>
                <div id="img-result" class="mt-4 rounded-2xl overflow-hidden min-h-[200px] flex items-center justify-center bg-black/20"></div>
            </div>
            <button onclick="this.closest('dialog').close()" class="mt-4 w-full text-slate-500 text-xs">Dismiss</button>
        </div>
    </dialog>

    <script>
        let currentUser = null;
        let dbUsers = JSON.parse(localStorage.getItem('sys_users') || '[]');
        let currentChat = { id: Date.now(), messages: [] };

        // Authentication logic
        function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return;

            let user = dbUsers.find(x => x.username === u);
            if(user) {
                if(user.password === p) login(user);
                else alert("Wrong password");
            } else {
                user = { username: u, password: p, role: dbUsers.length === 0 ? 'admin' : 'user' };
                dbUsers.push(user);
                localStorage.setItem('sys_users', JSON.stringify(dbUsers));
                login(user);
            }
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('role-tag').textContent = `Role: ${user.role}`;
            if(user.role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
            loadGlobalSettings();
        }

        // Settings Management
        function openSettings() {
            document.getElementById('set-api-key').value = localStorage.getItem('api_key') || '';
            document.getElementById('set-model-id').value = localStorage.getItem('model_id') || 'deepseek/deepseek-r1:free';
            document.getElementById('settings-dialog').showModal();
        }

        function saveGlobalSettings() {
            const key = document.getElementById('set-api-key').value.trim();
            const model = document.getElementById('set-model-id').value.trim();
            localStorage.setItem('api_key', key);
            localStorage.setItem('model_id', model);
            document.getElementById('settings-dialog').close();
            alert("Settings Saved Successfully!");
        }

        function loadGlobalSettings() {
            if(!localStorage.getItem('model_id')) localStorage.setItem('model_id', 'deepseek/deepseek-r1:free');
        }

        // Fast Chat Logic
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const key = localStorage.getItem('api_key');
            
            if(!text) return;
            if(!key) {
                addMessage('assistant', "⚠️ Error: Please set your API Key in Settings.");
                return;
            }

            addMessage('user', text);
            input.value = '';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: localStorage.getItem('model_id'),
                        messages: currentChat.messages
                    })
                });
                const data = await response.json();
                if(data.choices) {
                    addMessage('assistant', data.choices[0].message.content);
                } else {
                    addMessage('assistant', "⚠️ API Error: " + (data.error?.message || "Invalid Key"));
                }
            } catch (e) {
                addMessage('assistant', "❌ Connection Failed.");
            }
        }

        function addMessage(role, content) {
            currentChat.messages.push({ role, content });
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-anim`;
            div.innerHTML = `
                <div class="max-w-[85%] p-4 rounded-2xl ${role === 'user' ? 'bg-blue-600 text-white' : 'glass shadow-xl'}">
                    ${marked.parse(content)}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Image Generation Logic
        function openImageModal() { document.getElementById('image-dialog').showModal(); }

        function triggerImageGen() {
            const prompt = document.getElementById('img-prompt').value.trim();
            const out = document.getElementById('img-result');
            const btn = document.getElementById('gen-btn');

            if(!prompt) return;

            btn.disabled = true;
            btn.textContent = "Painting...";
            out.innerHTML = `<div class="animate-pulse text-blue-400">Quantum Rendering...</div>`;

            const randomSeed = Math.floor(Math.random() * 999999);
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${randomSeed}&width=1024&height=1024&nologo=true`;

            const img = new Image();
            img.src = url;
            img.className = "w-full animate-fadeIn";
            img.onload = () => {
                out.innerHTML = '';
                out.appendChild(img);
                btn.disabled = false;
                btn.textContent = "Generate Another Free";
            };
        }

        function createNewChat() {
            currentChat = { id: Date.now(), messages: [] };
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chat-title').textContent = "New Conversation";
        }

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
