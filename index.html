<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI | Advanced Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: white; height: 100vh; overflow: hidden; }
        
        .hero-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, #3245ff 0%, #bc45ff 25%, #0d1117 60%); z-index: -1; }
        .sphere { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.4; animation: float 15s infinite alternate ease-in-out; }
        .sphere-1 { width: 400px; height: 400px; background: #3245ff; top: -100px; left: -100px; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 60px); } }

        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .unity-input { background: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; color: white; transition: all 0.2s; }
        .unity-input:focus { border-color: #1f6feb; box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.2); outline: none; }
        
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="hero-bg"></div>
    <div class="sphere sphere-1"></div>

    <!-- Auth Screen (Login & Register Combined) -->
    <div id="auth-screen" class="w-full max-w-[400px] z-10 p-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter italic">UNITY AI</h1>
            <p id="auth-sub" class="text-slate-400 text-sm mt-2">Initialize your neural link</p>
        </div>

        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <div id="auth-fields" class="space-y-4">
                <input type="text" id="auth-name" placeholder="Full Name" class="w-full p-3.5 rounded-xl unity-input text-sm">
                <input type="email" id="auth-email" placeholder="Gmail Address" class="w-full p-3.5 rounded-xl unity-input text-sm">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-3.5 rounded-xl unity-input text-sm">
                
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-sm shadow-lg transition-all active:scale-95">
                    Sign In / Register
                </button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden fixed inset-0 z-50 bg-[#0d1117] flex flex-col lg:flex-row p-4 gap-4">
        <!-- Sidebar -->
        <aside class="w-72 glass rounded-3xl flex flex-col p-6 hidden lg:flex">
            <div class="mb-8 flex justify-between items-center">
                <span class="text-lg font-black tracking-tighter">UNITY AI</span>
                <span id="role-tag" class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-bold">USER</span>
            </div>

            <div class="flex-1 overflow-y-auto chat-container">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-4">Conversation History</p>
                <div id="history-list" class="space-y-2"></div>
            </div>

            <div class="pt-6 border-t border-white/5 space-y-2">
                <button id="admin-btn" onclick="document.getElementById('set-modal').showModal()" class="hidden w-full text-left p-3 hover:bg-white/5 rounded-xl text-xs text-slate-400">⚙️ Admin Config</button>
                <button onclick="logout()" class="w-full p-3 bg-rose-500/10 text-rose-500 rounded-xl text-xs font-bold hover:bg-rose-500/20 transition-all">TERMINATE SESSION</button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 glass rounded-[2.5rem] flex flex-col overflow-hidden">
            <header class="h-16 border-b border-white/5 flex items-center px-8 justify-between">
                <div class="flex items-center gap-4">
                    <span id="display-user" class="text-xs font-bold text-blue-400 uppercase tracking-widest"></span>
                </div>
                <!-- Image Model Selector -->
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-500 font-bold">IMAGE ENGINE:</span>
                    <select id="img-model" class="bg-black/40 border border-white/10 rounded-lg text-[10px] p-1 outline-none text-blue-400 font-bold">
                        <option value="veo2">VEO 2 (Ultra)</option>
                        <option value="veo3">VEO 3 (Extreme)</option>
                        <option value="grok">GROK (Creative)</option>
                        <option value="nano-banana">NANO BANANA</option>
                    </select>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6 chat-container"></div>

            <div class="p-6">
                <div class="max-w-4xl mx-auto bg-[#0d1117] border border-white/10 rounded-2xl p-1.5 flex items-center shadow-2xl">
                    <button onclick="toggleImageMode()" id="mode-btn" class="p-3 text-slate-500 hover:text-white transition-colors" title="Toggle Image Generation">🖼️</button>
                    <input id="chat-in" type="text" placeholder="Type a message or image prompt..." class="flex-1 p-3 bg-transparent outline-none text-sm" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition-all active:scale-90">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Admin Modal -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-sm">
        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-lg font-bold mb-4">Master Configuration</h2>
            <div class="space-y-4">
                <input type="password" id="api-key" class="w-full p-3 rounded-xl bg-black/40 border border-white/10 text-xs" placeholder="OpenRouter API Key">
                <input type="text" id="model-id" class="w-full p-3 rounded-xl bg-black/40 border border-white/10 text-xs" placeholder="AI Model ID">
                <button onclick="saveAdminSettings()" class="w-full bg-blue-600 p-3 rounded-xl font-bold text-sm">Save Global Config</button>
            </div>
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-4 text-[10px] text-slate-500 uppercase font-black">Close</button>
        </div>
    </dialog>

    <script>
        let isImageMode = false;
        let currentUser = JSON.parse(sessionStorage.getItem('activeUser')) || null;
        let users = JSON.parse(localStorage.getItem('unityUsers')) || [];

        // Logic for Admin and Persistence
        window.onload = () => {
            if(currentUser) {
                renderApp();
            }
        };

        function handleAuth() {
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(!name || !email || !pass) return alert("Fill all fields!");

            let user = users.find(u => u.email === email);
            
            if(user) {
                if(user.pass === pass) {
                    currentUser = user;
                } else {
                    return alert("Incorrect Password!");
                }
            } else {
                // First user is Admin
                const role = users.length === 0 ? 'ADMIN' : 'USER';
                user = { name, email, pass, role, history: [] };
                users.push(user);
                localStorage.setItem('unityUsers', JSON.stringify(users));
                currentUser = user;
            }

            sessionStorage.setItem('activeUser', JSON.stringify(currentUser));
            renderApp();
        }

        function renderApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-user').textContent = currentUser.name;
            document.getElementById('role-tag').textContent = currentUser.role;
            if(currentUser.role === 'ADMIN') document.getElementById('admin-btn').classList.remove('hidden');
            
            updateHistoryUI();
        }

        function toggleImageMode() {
            isImageMode = !isImageMode;
            document.getElementById('mode-btn').innerHTML = isImageMode ? "✨" : "🖼️";
            document.getElementById('chat-in').placeholder = isImageMode ? "Describe the image you want..." : "Type a message...";
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            // Add to Chat UI
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-[80%] text-sm shadow-xl">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            if(isImageMode) {
                generateImage(text);
            } else {
                getAIResponse(text);
            }
        }

        function generateImage(prompt) {
            const box = document.getElementById('chat-box');
            const model = document.getElementById('img-model').value;
            const imgId = 'img-' + Date.now();
            
            box.innerHTML += `<div class="flex justify-start"><div id="${imgId}" class="glass p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm">🎨 Rendering High Quality Photo...</div></div>`;
            
            // Simulating High-Quality Image Result from models like Veo/Nano Banana
            setTimeout(() => {
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt + " 8k resolution, cinematic lighting, masterpiece, high detail")}?model=${model}`;
                document.getElementById(imgId).innerHTML = `
                    <p class="text-[10px] text-blue-400 mb-2 font-bold uppercase tracking-tighter">Engine: ${model.toUpperCase()}</p>
                    <img src="${imgUrl}" class="rounded-xl w-full shadow-2xl border border-white/10" onload="window.scrollTo(0,document.body.scrollHeight)">
                    <a href="${imgUrl}" target="_blank" class="text-[10px] text-slate-500 mt-2 block hover:text-white">Download Full Quality</a>
                `;
                saveToHistory("Image: " + prompt);
            }, 2000);
        }

        async function getAIResponse(text) {
            const box = document.getElementById('chat-box');
            const aiId = 'ai-' + Date.now();
            box.innerHTML += `<div class="flex justify-start"><div id="${aiId}" class="glass p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm">Thinking...</div></div>`;
            
            // Dummy logic: Replace with your actual Fetch logic from previous steps
            setTimeout(() => {
                const reply = "This is a neural response from Unity AI. Ready to assist.";
                document.getElementById(aiId).innerHTML = marked.parse(reply);
                saveToHistory(text);
            }, 1000);
        }

        function saveToHistory(msg) {
            currentUser.history.unshift(msg);
            if(currentUser.history.length > 10) currentUser.history.pop();
            
            // Update storage
            const idx = users.findIndex(u => u.email === currentUser.email);
            users[idx].history = currentUser.history;
            localStorage.setItem('unityUsers', JSON.stringify(users));
            sessionStorage.setItem('activeUser', JSON.stringify(currentUser));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = currentUser.history.map(h => `
                <div class="p-3 text-[11px] bg-white/5 rounded-lg border border-white/5 truncate text-slate-400 cursor-pointer hover:text-white transition-all">
                    ${h}
                </div>
            `).join('');
        }

        function logout() {
            sessionStorage.removeItem('activeUser');
            location.reload();
        }

        function saveAdminSettings() {
            const k = document.getElementById('api-key').value;
            const m = document.getElementById('model-id').value;
            localStorage.setItem('admin_key', k);
            localStorage.setItem('admin_model', m);
            alert("Master Configuration Updated!");
            document.getElementById('set-modal').close();
        }
    </script>
</body>
</html>
