<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI — The future of building happens together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: white; overflow-x: hidden; }
        
        .hero-gradient {
            background: radial-gradient(circle at 50% -20%, #3245ff 0%, #bc45ff 35%, #0d1117 70%);
            min-height: 100vh;
        }

        .glass-nav { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px); }
        .input-box { background: #f6f8fa; color: #1f2328; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-hero { animation: fadeInUp 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <!-- Header / Nav -->
    <nav class="fixed top-0 w-full z-50 py-4 px-6 flex items-center justify-between glass-nav">
        <div class="flex items-center gap-8">
            <div class="text-2xl font-bold tracking-tighter">Unity AI</div>
            <div class="hidden lg:flex gap-6 text-sm font-medium text-slate-300">
                <span>Solutions ▾</span>
                <span>Resources ▾</span>
                <span>Open Source ▾</span>
                <span>Pricing</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-sm font-medium">Sign in</button>
            <button class="border border-white/30 px-3 py-1.5 rounded-md text-sm font-medium hover:border-white">Sign up</button>
        </div>
    </nav>

    <!-- Login/Landing Page Section -->
    <div id="auth-screen" class="hero-gradient flex flex-col items-center justify-center text-center px-4 pt-20">
        <div class="max-w-4xl animate-hero">
            <h1 class="text-5xl md:text-8xl font-extrabold tracking-tight mb-6 leading-tight">
                The future of building <br> happens together
            </h1>
            <p class="text-slate-400 text-lg md:text-xl mb-10 max-w-2xl mx-auto leading-relaxed">
                Tools and trends evolve, but collaboration endures. With Unity AI, developers, agents, and code come together on one platform.
            </p>
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-4 w-full max-w-2xl mx-auto">
                <div class="flex w-full md:w-auto bg-white rounded-l-md md:rounded-l-lg overflow-hidden flex-1">
                    <input type="text" id="user-name" placeholder="Enter your name" class="w-full p-4 text-black outline-none h-14">
                </div>
                <button onclick="login()" class="w-full md:w-auto bg-[#2ea44f] hover:bg-[#2c974b] text-white font-bold h-14 px-8 rounded-md md:rounded-r-lg transition-all">
                    Sign up for Unity AI
                </button>
                <button onclick="document.getElementById('set-modal').showModal()" class="w-full md:w-auto border border-white/30 hover:border-white/60 h-14 px-8 rounded-md font-bold transition-all">
                    Try Unity Copilot
                </button>
            </div>
        </div>
        
        <!-- Bottom Floating Graphic (Optional) -->
        <div class="mt-20 opacity-50 animate-bounce cursor-pointer" onclick="window.scrollTo({top: 500, behavior: 'smooth'})">
            <svg class="w-8 h-8 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>
    </div>

    <!-- Main Chat Dashboard -->
    <div id="app" class="hidden fixed inset-0 z-[100] bg-[#0d1117] flex flex-col lg:flex-row p-4 gap-4">
        <!-- Sidebar -->
        <aside class="w-72 bg-[#161b22] border border-[#30363d] rounded-2xl flex flex-col hidden lg:flex">
            <div class="p-6">
                <button onclick="location.reload()" class="w-full bg-[#238636] p-3 rounded-lg font-bold text-sm hover:bg-[#2ea043]">+ New Session</button>
            </div>
            <div class="flex-1 px-4 space-y-2">
                <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest px-2">Settings</div>
                <button onclick="document.getElementById('set-modal').showModal()" class="w-full text-left p-3 hover:bg-[#21262d] rounded-lg text-sm text-slate-300">⚙️ API Configuration</button>
            </div>
            <div class="p-6 border-t border-[#30363d]">
                <button onclick="location.reload()" class="w-full text-slate-500 text-xs hover:text-white">Sign Out</button>
            </div>
        </aside>

        <!-- Chat Main Area -->
        <main class="flex-1 bg-[#161b22] border border-[#30363d] rounded-2xl flex flex-col overflow-hidden">
            <header class="h-14 border-b border-[#30363d] flex items-center px-6 justify-between">
                <span class="text-xs font-bold text-blue-400" id="current-user"></span>
                <span class="text-[10px] text-slate-500">Unity AI Engine v2.6</span>
            </header>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container"></div>

            <div class="p-6 bg-[#0d1117]/50">
                <div class="max-w-4xl mx-auto flex gap-3 bg-[#0d1117] border border-[#30363d] rounded-xl p-2">
                    <input id="chat-in" type="text" placeholder="How can Unity AI help you today?" class="flex-1 p-3 bg-transparent outline-none text-sm" onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="bg-[#238636] px-5 py-2 rounded-lg font-bold text-sm">Send</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <dialog id="set-modal" class="bg-transparent m-auto p-4 w-full max-w-sm">
        <div class="bg-[#161b22] border border-[#30363d] p-8 rounded-2xl shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Unity AI Config</h2>
            <div class="space-y-4 text-sm">
                <div>
                    <label class="text-slate-500 block mb-1">OpenRouter Key</label>
                    <input type="password" id="api-key" class="w-full p-3 rounded-lg bg-[#0d1117] border border-[#30363d] outline-none">
                </div>
                <div>
                    <label class="text-slate-500 block mb-1">Model Name</label>
                    <input type="text" id="model-name" class="w-full p-3 rounded-lg bg-[#0d1117] border border-[#30363d] outline-none">
                </div>
                <button onclick="saveSettings()" class="w-full bg-[#238636] p-3 rounded-lg font-bold mt-2">Save Settings</button>
            </div>
            <button onclick="document.getElementById('set-modal').close()" class="w-full mt-4 text-xs text-slate-500 uppercase">Close</button>
        </div>
    </dialog>

    <script>
        let config = {
            key: localStorage.getItem('u_key') || "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",
            model: localStorage.getItem('u_model') || "openai/gpt-oss-120b:free"
        };
        let history = [];

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Please enter your name");
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('current-user').textContent = "DEVELOPOER / " + name.toUpperCase();
            document.getElementById('api-key').value = config.key;
            document.getElementById('model-name').value = config.model;
        }

        function saveSettings() {
            config.key = document.getElementById('api-key').value;
            config.model = document.getElementById('model-name').value;
            localStorage.setItem('u_key', config.key);
            localStorage.setItem('u_model', config.model);
            alert("Unity AI settings updated!");
            document.getElementById('set-modal').close();
        }

        async function send() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="flex justify-end"><div class="bg-[#1f6feb] p-4 rounded-xl rounded-tr-none max-w-[80%] text-sm">${text}</div></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const aiId = 'u-' + Date.now();
            box.innerHTML += `<div class="flex justify-start"><div id="${aiId}" class="bg-[#21262d] border border-[#30363d] p-4 rounded-xl rounded-tl-none max-w-[85%] text-sm">Unity AI is thinking...</div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "HTTP-Referer": "https://unitynodes.dpdns.org",
                        "X-Title": "Unity AI",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ model: config.model, messages: [...history, {role: "user", content: text}] })
                });

                const data = await res.json();
                const aiDiv = document.getElementById(aiId);
                
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    history.push({role: "user", content: text}, {role: "assistant", content: reply});
                    
                    // Fast Typing Simulation
                    aiDiv.innerHTML = "";
                    let idx = 0;
                    function type() {
                        if (idx < reply.length) {
                            aiDiv.innerHTML = marked.parse(reply.substring(0, idx + 8));
                            idx += 8;
                            box.scrollTop = box.scrollHeight;
                            setTimeout(type, 1);
                        } else {
                            aiDiv.innerHTML = marked.parse(reply);
                        }
                    }
                    type();
                } else {
                    aiDiv.innerHTML = "⚠️ API Error: " + (data.error?.message || "Check settings.");
                }
            } catch (e) {
                document.getElementById(aiId).innerHTML = "❌ Unity AI node disconnected.";
            }
        }
    </script>
</body>
</html>
